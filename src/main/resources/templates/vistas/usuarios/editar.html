<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="es">

<head th:replace="~{template :: head}"></head>

<body class="bg-secondary">
	<header th:replace="~{template :: header (${nomUser}, ${rol})}"></header>

	<div style="min-height: 39em;" class="container py-5">
		<div class="row d-flex justify-content-center align-items-center h-100">
			<div class="col-12 col-md-8 col-lg-6 col-xl-5">
				<div th:if="${error == '1'}">
					<div class="alert alert-danger" role="alert">
						Error al registro: Un usuario con ese email ya existe
					</div>
				</div>
					<div class="card bg-dark text-white" style="border-radius: 1rem;">
						<div class="card-body px-5 text-center">
							<div class="mb-2 mt-md-3 pb-5">
								<h2 class="fw-bold mb-3 text-uppercase"><u>USUARIO</u></h2>
								<div class="mb-5">
									<label class="form-label">Nombre</label>
									<input class="form-control" type="text" th:value="${nombre_usuario}"  disabled readonly>
								</div>
								<div class="mb-5">
									<label class="form-label">Direccion de correo</label>
									<input class="form-control" type="text" th:value="${correo_usuario}"  disabled readonly>
								</div>
								<div class="d-flex gap-5">
									<a th:href="@{/usuarios/cambiar}" class="btn btn-success w-80">Editar</a>
									<a th:href="@{/recetas}" class="btn btn-success w-80">Aceptar</a>
								</div>
							</div>
						</div>
					</div>
			</div>
		</div>
	</div>
	<footer th:replace="~{template :: footer}"></footer>
</body>

</html>
