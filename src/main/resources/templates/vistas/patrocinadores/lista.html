<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">

<head th:replace="~{template :: head}"></head>

<body class="bg-body-secondary">
    <header th:replace="~{template :: header (${nomUser}, ${rol})}"></header>

    <div class="container-fluid p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>RECETAS CON INGREDIENTES PATROCINADOS</h1>
            <a href="/patrocinadores" class="btn btn-outline-secondary">Actualizar lista</a>
        </div>

        <div th:if="${Mapa == null or #maps.isEmpty(Mapa)}" class="alert alert-warning">
            No hay patrocinadores registrados.
        </div>

        <div th:each="entry : ${Mapa.entrySet()}" class="card mb-4 border border-dark rounded shadow-sm">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-0" th:text="${entry.key.nombre}"></h2>
                    <p class="mb-0 text-muted" th:if="${entry.key.enlace != null}">
                        <a th:href="${entry.key.enlace}" target="_blank" th:text="${entry.key.enlace}"></a>
                    </p>
                </div>
                <span class="badge bg-success fs-6" th:text="${entry.value != null ? entry.value.size() : 0} + ' recetas'"></span>
            </div>
            <div class="card-body">
                <div th:if="${entry.value == null or #lists.isEmpty(entry.value)}">
                    <p class="text-muted">No hay recetas asociadas a este patrocinador.</p>
                </div>
                <div th:unless="${entry.value == null or #lists.isEmpty(entry.value)}">
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered align-middle text-center mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Receta</th>
                                    <th scope="col">Autor</th>
                                    <th scope="col">Ver receta</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="receta, iterStat : ${entry.value}">
                                    <td th:text="${iterStat.count}"></td>
                                    <td th:text="${receta.nombre}"></td>
                                    <td th:text="${receta.usuario != null ? receta.usuario.nombre : 'Desconocido'}"></td>
                                    <td>
                                        <a th:href="@{/recetas/ver(idReceta=${receta.idReceta})}" class="btn btn-success btn-sm">
                                            Ver receta
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{template :: footer}"></footer>
</body>

</html>
