<!DOCTYPE html>
<html lang="es">

<head th:replace="~{template :: head}"></head>

<body>
	<header th:replace="~{template :: header (${nomUser}, ${rol})}"></header>
	<h1>HOLa</h1>
	<table class="table table-success table-striped">
		<thead>
			<tr>
				<th scope="col">#</th>
				<th scope="col">Nombre</th>
				<th scope="col">Patrocinador</th>
				<th scope="col">Ver</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="ing : ${ingredientes}">
				<td th:text="${ing.getIdIngrediente()}"></td>
				<td th:text="${ing.nombre}"></td>
				<td th:text = "${ing.patrocinador == null? 'Sin Patrocinador' : ing.patrocinador.nombre}"></td>
				<td>
					<a th:href="@{/ingredientes/id(idIngrediente=${ing.idIngrediente})}" class="btn btn-success w-100">
						<i class="bi bi-eye-fill"></i> Ver
					</a>
				</td>
			</tr>
		</tbody>
	</table>
	<footer th:replace="~{template :: footer}"></footer>
</body>

</html>
