<!DOCTYPE html>
<html lang="es">

<head th:replace="~{template :: head}"></head>

<body>
	<header th:replace="~{template :: header (${nomUser}, ${rol})}"></header>
	<div class="d-flex justify-content-between align-items-center">
		<h1>Lista completa de ingredientes</h1>
		<form class="d-flex" onsubmit="return buscarIngrediente();">
			<input id="busqueda" class="form-control me-2" type="search" placeholder="Buscar ingrediente"
				aria-label="Buscar">
			<button class="btn btn-outline-success" type="submit">Buscar</button>
		</form>
	</div>
	<script>
		function buscarIngrediente() {
			const busqueda = document.getElementById('busqueda').value.toLowerCase();
			const filas = document.querySelectorAll('tbody tr');
			filas.forEach(fila => {
				const nombre = fila.querySelector('td:nth-child(2)').textContent.toLowerCase();
				if (nombre.includes(busqueda)) {
					fila.style.display = '';
				} else {
					fila.style.display = 'none';
				}
			});
			return false; 
		}
	</script>
	<table class="table table-success table-striped">
		<thead>
			<tr>
				<th scope="col">#</th>
				<th scope="col">Nombre</th>
				<th scope="col">Patrocinador</th>
				<th scope="col">Ver</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="ing : ${ingredientes}">
				<td th:text="${ing.getIdIngrediente()}"></td>
				<td th:text="${ing.nombre}"></td>
				<td th:text = "${ing.patrocinador == null? 'Sin Patrocinador' : ing.patrocinador.nombre}"></td>
				<td>
					<a th:href="@{/ingredientes/id(idIngrediente=${ing.idIngrediente})}" class="btn btn-success w-100">
						<i class="bi bi-eye-fill"></i> Ver
					</a>
				</td>
			</tr>
		</tbody>
	</table>
	<footer th:replace="~{template :: footer}"></footer>
</body>

</html>
