<!DOCTYPE html>
<html lang="es">

<head th:replace="~{template :: head}"></head>

<body>
	<header th:replace="~{template :: header (${nomUser}, ${rol})}"></header>
	<h1>HOLa</h1>
	<table class="table table-success table-striped">
		<thead>
			<tr>
				<th scope="col">#</th>
				<th scope="col">Nombre</th>
				<th scope="col">Ver</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="ing : ${ingredientes}">
				<td th:text="${ing.idIngrediente}"></td>
				<td th:text="${ing.nombre}"></td>
				<td>
					<button type="button" class="btn btn-success" th:ref="@{/${ing.idIngrediente}}">Ver</button>
				</td>
			</tr>
		</tbody>
	</table>
	<footer th:replace="~{template :: footer}"></footer>
</body>

</html>
